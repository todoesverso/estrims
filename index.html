<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Portfolio</title>
    <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        .video-thumbnail {
            cursor: pointer;
            margin: 10px;
            transition: transform 0.3s;
        }
        .video-thumbnail:hover {
            transform: scale(1.05);
        }
        #expanded-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #expanded-video-container.active {
            display: flex;
        }
        #expanded-video {
            width: 80%;
            height: 80%;
        }
        .close-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #fff;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>YouTube Video Portfolio</h1>
    <div id="video-gallery"></div>

    <div id="expanded-video-container" onclick="closeVideo(event)">
        <iframe id="expanded-video" width="560" height="315" src="" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <script>
        const videos = {
            video1: { id: "icylxdURbUo", title: "LuzuTV", description: "LUZU." },
            video2: { id: "SI__Kb_5es4", title: "OLGA", description: "Olga" },
            video3: { id: "E2k1lmbh_ew", title: "Gelatina", description: "GElatina" },
            video4: { id: "tvwUK4iOWCA", title: "Radioconvos", description: "Radioconvos" },
        };

        const videoGallery = document.getElementById('video-gallery');

        // for (const key in videos) {
        //     if (videos.hasOwnProperty(key)) {
        //         const video = videos[key];
        //         const img = document.createElement('img');
        //         img.src = `https://img.youtube.com/vi/${video.id}/mqdefault.jpg`;
        //         img.alt = video.title;
        //         img.className = 'video-thumbnail';
        //         img.onclick = () => expandVideo(video.id);
        //         videoGallery.appendChild(img);
        //     }
        // }


                // Replace with your GitHub Pages URL
        const dataUrl = "https://todoesverso.github.io/estrims/data.json";

        fetch(dataUrl)
            .then(response => response.json())
            .then(r => {
                r.data.forEach(video => {
                    const img = document.createElement('img');
                    img.src = `https://img.youtube.com/vi/${video.live_id}/mqdefault.jpg`;
                    img.alt = video.title;
                    img.className = 'video-thumbnail';
                    img.onclick = () => expandVideo(video.id);
                    videoGallery.appendChild(img);
                });
            });

        function expandVideo(videoId) {
            document.getElementById('expanded-video').src = `https://www.youtube.com/embed/${videoId}`;
            document.getElementById('expanded-video-container').classList.add('active');
        }

        function closeVideo(event) {
            if (event.target.id === 'expanded-video-container' || event.target.className === 'close-button') {
                document.getElementById('expanded-video').src = '';
                document.getElementById('expanded-video-container').classList.remove('active');
            }
        }
    </script>
</body>
</html>
