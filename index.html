<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESTRIMS</title>
  <script src="https://unpkg.com/htmx.org@3.0.0/dist/htmx.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.1/css/bulma.min.css">
  <style>
    .video-thumbnail {
      box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px, rgba(0, 0, 0, 0.3) 0px 30px 60px -30px, rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
      transition: transform 0.3s;
    }

    .video-thumbnail:hover {
      transform: scale(1.05);
    }

    #expanded-video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #expanded-video-container.active {
      display: flex;
    }

    #expanded-video {
      width: 80%;
      height: 80%;
    }

    #expanded-video-container .close-button {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="tabs is-centered is-large  is-toggle">
      <ul>
        <li class="is-active" data-tab="tab-live"><a>LIVE</a></li>
        <li data-tab="tab-latest"><a>Ultimos</a></li>
      </ul>
    </div>

    <div id="tab-live" class="tab-content columns is-multiline is-active"></div>
    <div id="tab-latest" class="tab-content columns is-multiline"></div>
  </div>

  <div id="expanded-video-container" onclick="closeVideo(event)">
    <span class="close-button" onclick="closeVideo(event)">×</span>
    <iframe id="expanded-video" width="560" height="315" src="" frameborder="0" allowfullscreen
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
  </div>

  <script>
    const videoGallery = document.getElementById('video-gallery');

    const dataUrl = "https://todoesverso.github.io/estrims/data.json";
    const fetchDataUrl = `${dataUrl}?timestamp=${new Date().getTime()}`;

    fetch(fetchDataUrl)
      .then(response => response.json())
      .then(data => {
        data.data.forEach(video => {
          addCard('tab-live', video.live_id, video.live_title, true);
          addCard('tab-latest', video.last_video_id, video.last_video_title, false);
        });

        showTab('tab-live'); // Show the first tab by default
      })
      .catch(error => {
        console.error('Error fetching data:', error);
      });

    function addCard(tabId, videoId, title, is_live) {
      const tabContent = document.getElementById(tabId);
      if (tabContent && videoId !== null) {
        const column = document.createElement('div');
        column.className = 'column is-one-quarter';
        column.appendChild(createVideoCard(videoId, title, is_live));
        tabContent.appendChild(column);
      }
    }

    function createVideoCard(videoId, title, is_live) {
      const show_live_tag = (is_live === true) ? "" : "is-hidden";
      const card = document.createElement('div');
      card.className = 'card video-thumbnail';
      card.innerHTML = `
        <div class="card-image">
          <figure class="image is-4by3">
            <img src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" alt="${title}" onclick="expandVideo('${videoId}')">
          </figure>
        </div>
        <div class="card-content">
          <div class="media">
            <div class="media-content">
              <p class="title is-4">${title}</p>
              <span class="tag is-danger ${show_live_tag}">live</span>
            </div>
          </div>
        </div>
      `;
      return card;
    }


    function showTab(tabId) {
      const tabs = document.querySelectorAll('.tab-content');
      tabs.forEach(tab => {
        if (tab.id === tabId) {
          tab.classList.add('is-active');
          tab.classList.remove('is-hidden');
        } else {
          tab.classList.remove('is-active');
          tab.classList.add('is-hidden');
        }
      });

      const tabButtons = document.querySelectorAll('.tabs li');
      tabButtons.forEach(button => {
        button.classList.remove('is-active');
      });
      document.querySelector(`.tabs li[data-tab="${tabId}"]`).classList.add('is-active');
    }

    document.querySelectorAll('.tabs li').forEach(tabButton => {
      tabButton.addEventListener('click', function () {
        const tabId = this.getAttribute('data-tab');
        showTab(tabId);
      });
    });


    function expandVideo(videoId) {
      document.getElementById('expanded-video').src = `https://www.youtube.com/embed/${videoId}`;
      document.getElementById('expanded-video-container').classList.add('active');
    }

    function closeVideo(event) {
      if (event.target.id === 'expanded-video-container') {
        document.getElementById('expanded-video').src = '';
        document.getElementById('expanded-video-container').classList.remove('active');
      }
    }
  </script>
</body>

</html>
